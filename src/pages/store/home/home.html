<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store Rodriguez Joaquin</title>
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <header>
        <h1>Food Store</h1>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="../cart/cart.html">Carrito</a></li>
                <li><a href="#" id="logoutButton" style="color: red;">Cerrar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <h2>Categorías</h2>
            <ul>
                <li><button class="btn-categoria" data-categoria="todas">Todas</button></li>
                <li><button class="btn-categoria" data-categoria="hamburguesa">Hamburguesas</button></li>
                <li><button class="btn-categoria" data-categoria="pizza">Pizzas</button></li>
                <li><button class="btn-categoria" data-categoria="gaseosa">Bebidas</button></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="search-container">
                <form id="form-busqueda">
                    <input id="buscarProducto" type="text" placeholder="Ej: Hamburguesa, Pizza, Bebida">
                    <button type="submit">Buscar</button>
                </form>
            </div>

            <h2>Productos destacados</h2>
            <section id="contenedor-productos"></section>
        </main>
    </div>

    <footer>
        <p>© 2026 Food Store</p>
        <p>Contacto: info@foodstore.com</p>
    </footer>

    <script type="module" src="./home.ts"></script>
</body>
</html>
