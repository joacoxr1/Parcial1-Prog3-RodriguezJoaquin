<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Store</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-card">
        
        <h1>Food Store</h1>
        <h2>Iniciar Sesión</h2>

        <form id="form-login">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="tucorreo@gmail.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required>

            <label for="rol">Entrar como:</label>
            <select id="role">
                <option value="admin">Administrador</option>
                <option value="client">Cliente</option>
            </select>
            <br><br>

            <button type="submit">INGRESAR</button>
            
            <p class="registro">¿No tenés cuenta? <a href="/src/pages/auth/registro/registro.html">Registrate acá</a></p>
        </form>

    </div>

    <script type="module" src="./login.ts"></script>
</body>
</html>
